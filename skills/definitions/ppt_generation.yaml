name: "PPT生成"
description: "根据内容生成专业PPT演示文稿，支持模板匹配、大纲生成、内容创作和质量检查"
type: "preset"
version: "1.0.0"
tags: ["演示文稿", "PPT", "汇报", "演示", "幻灯片"]

# 触发模式
triggers:
  - pattern: "生成PPT"
    confidence: 1.0
  - pattern: "制作演示稿"
    confidence: 0.9
  - pattern: "做个PPT"
    confidence: 0.85
  - pattern: "生成幻灯片"
    confidence: 0.8
  - pattern: "制作PPT"
    confidence: 0.95

# 工具调用流程
workflow:
  - id: "template_match"
    tool: "ppt_template_match"
    description: "根据内容匹配合适的PPT模板"
    parameters:
      content: "{{input.content}}"
      style_hint: "{{input.style}}"
    output_key: "template_result"
  
  - id: "generate_outline"
    tool: "ppt_generate_outline"
    description: "根据内容生成PPT大纲"
    parameters:
      title: "{{input.title}}"
      content: "{{input.content}}"
      style_config: "{{output.template_result.spec_lock.design_spec}}"
    output_key: "outline_result"
    requires_confirmation: true
    confirmation_prompt: "已为您生成以下PPT大纲，请确认是否满意？\n\n{{output.outline_result.outline}}\n\n回复 是/确认 继续生成，或 重新生成/修改+内容 进行调整"
  
  - id: "generate_content"
    tool: "ppt_generate_content"
    description: "根据大纲生成幻灯片内容"
    parameters:
      outline: "{{output.outline_result.outline}}"
      template_id: "{{output.template_result.templates.0.id}}"
      style_config: "{{output.template_result.spec_lock.design_spec}}"
    output_key: "content_result"
  
  - id: "generate_file"
    tool: "ppt_generate_file"
    description: "生成PPTX文件"
    parameters:
      title: "{{input.title}}"
      slides: "{{output.content_result.slides}}"
    output_key: "file_result"
  
  - id: "quality_check"
    tool: "ppt_quality_check"
    description: "检查PPT质量"
    parameters:
      file_path: "{{output.file_result.file_path}}"
    output_key: "quality_result"
  
  - id: "send_file"
    tool: "ppt_feishu_send"
    description: "发送PPT到飞书"
    parameters:
      file_path: "{{output.file_result.file_path}}"
      user_id: "{{context.user_id}}"
    output_key: "send_result"

# 输入参数定义
input_schema:
  type: object
  properties:
    title:
      type: string
      description: PPT标题
    content:
      type: string
      description: 内容文本或文档内容
    style:
      type: string
      description: 风格提示
      enum: ["商务", "学术", "创意", "极简", "麦肯锡"]
      default: "商务"

# 输出定义
output_schema:
  type: object
  properties:
    file_path:
      type: string
      description: 生成的PPT文件路径
    slides_count:
      type: integer
      description: 幻灯片数量
    quality_score:
      type: number
      description: 质量分数